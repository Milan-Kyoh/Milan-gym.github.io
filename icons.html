<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icoon-generator · Milan Routine</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0c0e12; color:#eef0f5; margin:0; padding:40px 20px; text-align:center; }
  h1 { font-size:20px; }
  p { color:#9aa3b2; font-size:14px; max-width:520px; margin:10px auto 30px; line-height:1.6; }
  .row { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .box { background:#13161d; border:1px solid #22273a; border-radius:16px; padding:18px; }
  canvas { display:block; border-radius:12px; margin:0 auto 12px; width:140px; height:140px; }
  a { display:inline-block; background:#1b2d52; color:#5b8dee; border:1px solid #5b8dee; border-radius:9px; padding:9px 14px; font-size:13px; font-weight:700; text-decoration:none; }
</style>
</head>
<body>
  <h1>iOS-iconen genereren</h1>
  <p>Optioneel. Voor een eigen icoon op je iPhone-beginscherm: klik hieronder op elke knop om het PNG-bestand op te slaan, en leg ze in dezelfde map als <b>index.html</b>. (Android/Chrome heeft dit niet nodig — die gebruikt icon.svg automatisch.)</p>
  <div class="row" id="row"></div>
<script>
  const sizes = [
    { px: 180, file: 'apple-touch-icon.png', label: 'apple-touch-icon (180)' },
    { px: 192, file: 'icon-192.png', label: 'icon-192' },
    { px: 512, file: 'icon-512.png', label: 'icon-512' }
  ];
  const row = document.getElementById('row');
  const img = new Image();
  img.src = 'icon.svg';
  img.onload = () => {
    sizes.forEach(s => {
      const box = document.createElement('div');
      box.className = 'box';
      const c = document.createElement('canvas');
      c.width = s.px; c.height = s.px;
      c.getContext('2d').drawImage(img, 0, 0, s.px, s.px);
      const a = document.createElement('a');
      a.textContent = '⬇ ' + s.label;
      a.href = c.toDataURL('image/png');
      a.download = s.file;
      box.appendChild(c); box.appendChild(a);
      row.appendChild(box);
    });
  };
  img.onerror = () => { row.innerHTML = '<p>Kon icon.svg niet laden. Open deze pagina vanaf dezelfde map als icon.svg.</p>'; };
</script>
</body>
</html>
